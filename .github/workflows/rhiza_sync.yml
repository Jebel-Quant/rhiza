# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Sync
#
# Purpose: Synchronizes the repository with its upstream rhiza template.
#          On Renovate/rhiza branch push: auto-commits synced files directly
#          to the branch. On schedule/dispatch: opens a pull request.
#
# IMPORTANT: A PAT with 'workflow' scope (PAT_TOKEN) is required when workflow
#            files are modified. See .github/CONFIG.md for setup instructions.
#
# Trigger: On Renovate/rhiza branch push, weekly schedule, and manual dispatch.

name: "(RHIZA) SYNC"

# Queue runs instead of cancelling: a release or sync must never be
# interrupted mid-publish or mid-push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - 'renovate/jebel-quant-rhiza-**'
      - 'rhiza/**'
    paths:
      - '.rhiza/template.yml'
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:
    inputs:
      create-pr:
        description: "Create a pull request"
        type: boolean
        default: true
  workflow_call:
    inputs:
      direct:
        description: "Run sync-direct (commit to branch) instead of sync-pr"
        type: boolean
        default: false
      create-pr:
        description: "Create a pull request (sync-pr mode only)"
        type: boolean
        default: true
    secrets:
      PAT_TOKEN:
        required: false

jobs:
  sync-direct:
    name: Sync and commit (Renovate)
    if: (github.event_name == 'push' || inputs.direct == true) && github.repository != 'jebel-quant/rhiza'
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Check PAT_TOKEN configuration
        shell: bash
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "::warning::PAT_TOKEN secret is not configured."
            echo "::warning::If this sync modifies workflow files, the push will fail."
            echo "::warning::See .github/CONFIG.md for setup instructions."
          else
            echo "✓ PAT_TOKEN is configured."
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Get Rhiza version
        id: rhiza-version
        run: |
          VERSION=$(cat .rhiza/.rhiza-version 2>/dev/null || echo "0.9.0")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync rhiza template
        id: sync
        run: |
          set -euo pipefail

          RHIZA_VERSION="${{ steps.rhiza-version.outputs.version }}"

          echo "Running rhiza sync with version >=${RHIZA_VERSION}"
          uvx "rhiza>=${RHIZA_VERSION}" sync .

          if git diff --quiet; then
            echo "No changes detected after template sync"
            echo "changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Template changes detected"
          echo "changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.sync.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ secrets.PAT_TOKEN || github.token }}@github.com/".insteadOf "https://github.com/"

          git add -A
          git commit -m "$(cat <<'EOF'
          chore: sync rhiza template files

          Automatically synced template files after updating .rhiza/template.yml

          Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          EOF
          )"

          git push

  sync-pr:
    name: Sync and open PR (scheduled/manual)
    if: github.event_name != 'push' && inputs.direct != true && github.repository != 'jebel-quant/rhiza'
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Define sync branch name
        id: branch
        run: |
          echo "name=rhiza/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Check PAT_TOKEN configuration
        shell: bash
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "::warning::PAT_TOKEN secret is not configured."
            echo "::warning::If this sync modifies workflow files, the push will fail."
            echo "::warning::See .github/CONFIG.md for setup instructions."
          else
            echo "✓ PAT_TOKEN is configured."
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Get Rhiza version
        id: rhiza-version
        run: |
          VERSION=$(cat .rhiza/.rhiza-version 2>/dev/null || echo "0.9.0")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync template
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          RHIZA_VERSION="${{ steps.rhiza-version.outputs.version }}"

          uvx "rhiza>=${RHIZA_VERSION}" sync .

          git add -A

          if git diff --cached --quiet; then
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changes_detected=true" >> "$GITHUB_OUTPUT"

          # Generate PR description based on staged changes
          uvx "rhiza>=${RHIZA_VERSION}" summarise --output "${RUNNER_TEMP}/pr-description.md"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ secrets.PAT_TOKEN || github.token }}@github.com/".insteadOf "https://github.com/"

          git commit -m "chore: Update via rhiza"

      - name: Create pull request
        if: >
          (github.event_name == 'schedule' || inputs.create-pr == true)
          && steps.sync.outputs.changes_detected == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          base: ${{ github.event.repository.default_branch }}
          branch: ${{ steps.branch.outputs.name }}
          delete-branch: true
          title: "chore: Sync with rhiza"
          body-path: ${{ runner.temp }}/pr-description.md
