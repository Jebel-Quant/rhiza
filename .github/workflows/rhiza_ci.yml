# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Continuous Integration
#
# Purpose: Run tests on multiple Python versions, check dependencies, run
#          pre-commit hooks, verify documentation coverage, validate the
#          project, run security scans, and check license compliance.
#
# Python version matrix source of truth:
# - Generated by `make -f .rhiza/rhiza.mk -s version-matrix`
# - Reads `Programming Language :: Python :: 3.x` classifiers in pyproject.toml
# - Adding/removing classifiers updates CI Python coverage automatically
#
# Trigger: On push and pull_request.

name: "(RHIZA) CI"

# Cancel superseded in-progress runs of this workflow for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

on:
  push:
  pull_request:
  workflow_call:
    secrets:
      GH_PAT:
        required: false
      UV_EXTRA_INDEX_URL:
        required: false

jobs:
  generate-matrix:
    # CI budget: ≤5 min (matrix generation/setup). Last measured: 2026-05-28.
    timeout-minutes: 5
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.list }}
      os_matrix: ${{ steps.os.outputs.list }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.9
        with:
          token: ${{ secrets.GH_PAT }}

      - id: versions
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          # Generate Python versions JSON from the script
          JSON=$(make -f .rhiza/rhiza.mk -s version-matrix)
          echo "list=$JSON" >> "$GITHUB_OUTPUT"

      - name: Debug matrix
        run: |
          echo "Python versions: ${{ steps.versions.outputs.list }}"

      - id: os
        run: |
          OS_MATRIX=$(make -f .rhiza/rhiza.mk -s ci-os-matrix)
          echo "list=$OS_MATRIX" >> "$GITHUB_OUTPUT"

      - name: Debug OS matrix
        run: |
          echo "OS versions: ${{ steps.os.outputs.list }}"

  test:
    # CI budget: ≤20 min (test matrix execution). Last measured: 2026-05-28.
    timeout-minutes: 20
    needs: generate-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
        os: ${{ fromJson(needs.generate-matrix.outputs.os_matrix) }}
      fail-fast: false

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true

      - name: Install uv
        id: install-uv
        continue-on-error: true
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"
          python-version: ${{ matrix.python-version }}

      - name: Retry uv installation
        if: steps.install-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"
          python-version: ${{ matrix.python-version }}

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.9
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Cache uv artifacts
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Run tests
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        shell: bash
        run: |
          make test

      - name: Verify clean working tree
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          status="$(git status --porcelain)"
          if [[ -n "$status" ]]; then
            echo "Working tree is dirty after make test:"
            printf '%s\n' "$status"
            git diff --exit-code || true
            exit 1
          fi

      - name: Upload coverage report
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: _tests/coverage.xml
          if-no-files-found: ignore


  lowest-deps:
    name: Lowest-direct dependency compatibility
    # CI budget: ≤20 min (dependency compatibility test run). Last measured: 2026-05-28.
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.9
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install .rhiza/requirements with lowest-direct resolution
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          uv sync --all-extras --resolution lowest-direct
          for req in .rhiza/requirements/*.txt; do
            uv pip install --resolution lowest-direct -r "$req"
          done

      - name: Run tests with lowest-direct resolution
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: uv run --all-extras --resolution lowest-direct pytest tests -q --ignore=tests/stress --ignore=tests/benchmarks

  typecheck:
    name: Type checking (Python ${{ matrix.python-version }})
    # CI budget: ≤5 min (lint/typecheck quality gate). Last measured: 2026-05-28.
    timeout-minutes: 5
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"
          python-version: ${{ matrix.python-version }}

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.9
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run ty and mypy type checkers (make typecheck)
        # Runs `uv run ty check src/` and `uv run mypy --strict src/`
        # as defined in .rhiza/make.d/test.mk. Set TYPECHECKER=ty or
        # TYPECHECKER=mypy to run only one of the two checkers.
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make typecheck

  deptry:
    name: Check dependencies with deptry
    # CI budget: ≤5 min (lint/dependency hygiene check). Last measured: 2026-05-28.
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.9
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run deptry
        run: make deptry

  pre-commit:
    name: Pre-commit hooks
    # CI budget: ≤5 min (lint/format hooks). Last measured: 2026-05-28.
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.9
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Cache pre-commit environments
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - name: Run pre-commit
        run: |
          make fmt

  docs-coverage:
    # CI budget: ≤10 min (docs quality check). Last measured: 2026-05-28.
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.9
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Check docs coverage
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          make docs-coverage

  dogfood-symlinks:
    name: Dogfood symlink drift guard
    # Mother-repo-only: the bundles/ single-source-of-truth tree exists only here, so
    # this guard fails a PR that adds a bundle file (or lets a copy reappear) without
    # running `make sync-self`. Downstream projects have no bundles/ dir and never run it.
    # CI budget: ≤5 min (single dry-run check). Last measured: 2026-07-06.
    if: github.repository == 'jebel-quant/rhiza'
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.9
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Check dogfood symlinks are up to date
        run: make sync-self-check

  validation:
    # CI budget: ≤5 min (validation quality gate). Last measured: 2026-05-28.
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.9
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Validate
        shell: bash
        run: |
          make validate

  security:
    name: Security scanning
    # CI budget: ≤10 min (security scanning and suppression audit). Last measured: 2026-05-28.
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.9
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run security scans
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make security

      - name: Fail stale CVE suppressions
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          uv run python .rhiza/utils/suppression_audit.py --fail-stale-nosec-cve

  license:
    name: License compliance scan
    # CI budget: ≤10 min (license and artifact generation). Last measured: 2026-05-28.
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.9
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run license check
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make license

      - name: Generate LICENSES.md
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          uv run --with pip-licenses pip-licenses --format markdown --output-file LICENSES.md

      - name: Upload LICENSES.md
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LICENSES.md
          path: LICENSES.md
          if-no-files-found: ignore

  ci-gate:
    name: CI gate
    # Roll-up gate: a single required status check that aggregates the test,
    # typecheck, and lowest-deps jobs. Branch protection requires this context
    # instead of every per-leg name, so the matrix can change without editing
    # the ruleset.
    # CI budget: ≤5 min (result aggregation only). Last measured: 2026-06-27.
    timeout-minutes: 5
    if: always()
    needs: [test, typecheck, lowest-deps]
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Verify test, typecheck, and lowest-deps succeeded
        run: |
          echo "test result:       ${{ needs.test.result }}"
          echo "typecheck result:  ${{ needs.typecheck.result }}"
          echo "lowest-deps result: ${{ needs.lowest-deps.result }}"
          # Accept "success" or "cancelled" (transient runner cancellation).
          # Reject "failure" (real failure) and "skipped" (job never ran).
          if [[ "${{ needs.test.result }}" != "success" && "${{ needs.test.result }}" != "cancelled" \
             || "${{ needs.typecheck.result }}" != "success" && "${{ needs.typecheck.result }}" != "cancelled" \
             || "${{ needs.lowest-deps.result }}" != "success" && "${{ needs.lowest-deps.result }}" != "cancelled" ]]; then
            echo "::error::test, typecheck, and/or lowest-deps did not succeed; failing the CI gate."
            exit 1
          fi
          echo "All required CI jobs succeeded."
