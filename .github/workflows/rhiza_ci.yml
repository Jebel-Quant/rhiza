# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Continuous Integration
#
# Purpose: Run tests on multiple Python versions, check dependencies, run
#          pre-commit hooks, verify documentation coverage, validate the
#          project, run security scans, and check license compliance.
#
# Trigger: On push and pull_request.

name: "(RHIZA) CI"

# Cancel superseded in-progress runs of this workflow for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

on:
  push:
  pull_request:
  workflow_call:
    secrets:
      GH_PAT:
        required: false
      UV_EXTRA_INDEX_URL:
        required: false

jobs:
  generate-matrix:
    # CI budget: ≤5 min (matrix generation/setup). Last measured: 2026-05-28.
    timeout-minutes: 5
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.list }}
      os_matrix: ${{ steps.os.outputs.list }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.18.8
        with:
          token: ${{ secrets.GH_PAT }}

      - id: versions
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          # Generate Python versions JSON from the script
          JSON=$(make -f .rhiza/rhiza.mk -s version-matrix)
          echo "list=$JSON" >> "$GITHUB_OUTPUT"

      - name: Debug matrix
        run: |
          echo "Python versions: ${{ steps.versions.outputs.list }}"

      - id: os
        run: |
          OS_MATRIX=$(make -f .rhiza/rhiza.mk -s ci-os-matrix)
          echo "list=$OS_MATRIX" >> "$GITHUB_OUTPUT"

      - name: Debug OS matrix
        run: |
          echo "OS versions: ${{ steps.os.outputs.list }}"

  test:
    # CI budget: ≤20 min (test matrix execution). Last measured: 2026-05-28.
    timeout-minutes: 20
    needs: generate-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
        os: ${{ fromJson(needs.generate-matrix.outputs.os_matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Install uv
        id: install-uv
        continue-on-error: true
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.11.16"
          python-version: ${{ matrix.python-version }}

      - name: Retry uv installation
        if: steps.install-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.11.16"
          python-version: ${{ matrix.python-version }}

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.18.8
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Cache uv artifacts
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Run tests
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        shell: bash
        run: |
          make test

      - name: Upload coverage report
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: _tests/coverage.xml
          if-no-files-found: ignore


  lowest-deps:
    name: Lowest-direct dependency compatibility
    # CI budget: ≤20 min (dependency compatibility test run). Last measured: 2026-05-28.
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.18.8
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install .rhiza/requirements with lowest-direct resolution
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          uv sync --resolution lowest-direct
          for req in .rhiza/requirements/*.txt; do
            uv pip install --resolution lowest-direct -r "$req"
          done

      - name: Run tests with lowest-direct resolution
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: uv run --resolution lowest-direct pytest tests -q --ignore=tests/stress --ignore=tests/benchmarks

  typecheck:
    name: Type checking (Python ${{ matrix.python-version }})
    # CI budget: ≤5 min (lint/typecheck quality gate). Last measured: 2026-05-28.
    timeout-minutes: 5
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.11.16"
          python-version: ${{ matrix.python-version }}

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.18.8
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run ty type checker (make typecheck)
        # Runs `uv run ty check src/` as defined in .rhiza/make.d/test.mk.
        # ty is configured via [tool.ty.environment] in pyproject.toml.
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make typecheck

  deptry:
    name: Check dependencies with deptry
    # CI budget: ≤5 min (lint/dependency hygiene check). Last measured: 2026-05-28.
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.18.8
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run deptry
        run: make deptry

  pre-commit:
    name: Pre-commit hooks
    # CI budget: ≤5 min (lint/format hooks). Last measured: 2026-05-28.
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.18.8
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Cache pre-commit environments
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - name: Run pre-commit
        run: |
          make fmt

  docs-coverage:
    # CI budget: ≤10 min (docs quality check). Last measured: 2026-05-28.
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.18.8
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Check docs coverage
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          make docs-coverage

  validation:
    # CI budget: ≤5 min (validation quality gate). Last measured: 2026-05-28.
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.18.8
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Validate
        shell: bash
        run: |
          make validate

  security:
    name: Security scanning
    # CI budget: ≤10 min (security scanning and suppression audit). Last measured: 2026-05-28.
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.18.8
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run security scans
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make security

      - name: Fail stale CVE suppressions
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          uv run python .rhiza/utils/suppression_audit.py --fail-stale-nosec-cve

  license:
    name: License compliance scan
    # CI budget: ≤10 min (license and artifact generation). Last measured: 2026-05-28.
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.18.8
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run license check
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make license

      - name: Generate LICENSES.md
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          uv run --with pip-licenses pip-licenses --format markdown --output-file LICENSES.md

      - name: Upload LICENSES.md
        uses: actions/upload-artifact@v7.0.1
        with:
          name: LICENSES.md
          path: LICENSES.md
          if-no-files-found: ignore
