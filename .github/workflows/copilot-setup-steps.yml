# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Copilot Setup Steps
#
# Purpose: Preconfigure the development environment before the Copilot
#          coding agent begins working. This ensures the agent always
#          has a deterministic, fully working environment.
#
# Reference: https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

name: "(RHIZA) AGENT SETUP"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

# Cancel superseded in-progress runs of this workflow for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make install

      - name: Activate virtual environment
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
