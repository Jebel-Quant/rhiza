# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Benchmarks
#
# Purpose: Run the benchmark suite on pushes to main to create a measurable
#          performance baseline over time.
#
# Trigger: This workflow runs on pushes to the main branch.

name: "(RHIZA) BENCHMARK"

# Cancel superseded in-progress runs of this workflow for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_call:
    secrets:
      GH_PAT:
        required: false
      UV_EXTRA_INDEX_URL:
        required: false

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v1.2.2
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run benchmarks
        timeout-minutes: 20
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          START=$(date +%s)
          make benchmark
          echo "Benchmark run: $(($(date +%s) - START))s" >> "$GITHUB_STEP_SUMMARY"
