# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Benchmarks
#
# Purpose: Run the benchmark suite on pushes to main to create a measurable
#          performance baseline over time.
#
# Trigger: This workflow runs on pushes to the main branch.

name: "(RHIZA) BENCHMARK"

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_call:
    secrets:
      GH_PAT:
        required: false
      UV_EXTRA_INDEX_URL:
        required: false

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.15.2
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run benchmarks
        timeout-minutes: 20
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          START=$(date +%s)
          make benchmark
          echo "Benchmark run: $(($(date +%s) - START))s" >> "$GITHUB_STEP_SUMMARY"
