# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Weekly
#
# Purpose: Runs checks that are too slow or noisy for every push:
#   dep-compat-test — resolves dependencies fresh (ignoring the lockfile) and
#                     runs the full test suite to catch newly-released packages
#                     that break compatibility before Renovate picks them up.
#   semgrep         — static analysis with project-specific rules.
#   pip-audit       — dependency vulnerability scan.
#   link-check      — verifies all hyperlinks in README.md are reachable.
#
# Trigger: Weekly schedule (Monday 08:00 UTC) and manual dispatch.

name: "(RHIZA) WEEKLY"

# Cancel superseded in-progress runs of this workflow for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  #push:
  #  branches: [main]
  #  paths: [README.md]
  #pull_request:
  #  paths: [README.md]
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:
  workflow_call:
    secrets:
      GH_PAT:
        required: false
      UV_EXTRA_INDEX_URL:
        required: false

jobs:
  dep-compat-test:
    name: Test with latest compatible dependencies
    runs-on: ubuntu-latest
    #if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Resolve and install latest compatible dependencies
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          # --upgrade ignores the committed lockfile and resolves the newest
          # versions that satisfy pyproject.toml constraints.
          uv sync --upgrade

      - name: Show resolved package versions
        run: |
          echo "=== Installed package versions ==="
          uv pip list

      - name: Run tests
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make test

  semgrep:
    name: Semgrep (numpy)
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Configure git auth for private packages
        uses: jebel-quant/rhiza/.github/actions/configure-git-auth@v0.19.4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run Semgrep
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make semgrep

  pip-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.16"

      - name: Run pip-audit
        run: uvx pip-audit

  link-check:
    name: Check links in README.md
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check links in README.md
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,429
            README.md
          fail: true
