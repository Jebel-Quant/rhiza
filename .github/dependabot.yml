updates:
- commit-message:
    include: scope
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
  directory: /
  groups:
    python-dependencies:
      patterns:
      - "*"
      update-types:
      - patch
      - minor
  ignore:
  - dependency-name: "*"
    update-types:
    - version-update:semver-major
  labels:
  - dependencies
  - python
  open-pull-requests-limit: 10
  package-ecosystem: uv
  schedule:
    day: tuesday
    interval: weekly
    time: "09:00"
    timezone: Asia/Dubai
- commit-message:
    include: scope
    prefix: chore(deps)
  directory: /
  groups:
    github-actions:
      patterns:
      - "*"
      update-types:
      - patch
      - minor
  ignore:
  - dependency-name: "*"
    update-types:
    - version-update:semver-major
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - dependencies
  - github-actions
  open-pull-requests-limit: 10
  package-ecosystem: github-actions
  schedule:
    day: tuesday
    interval: weekly
    time: "09:00"
    timezone: Asia/Dubai
version: 2
