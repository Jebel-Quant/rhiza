# Rhiza Template Bundle Definitions
#
# This file defines two layers of configuration:
#
# 1. bundles: atomic, file-owning building blocks.
#    Every synced file belongs to exactly one bundle. Feature bundles are
#    local-first — they do not include hosted workflow files. GitHub Actions
#    workflow files (thin wrappers that delegate to reusable workflows in
#    jebel-quant/rhiza) live in dedicated github-<feature> overlay bundles.
#
#    File ownership is expressed through the filesystem: each bundle has a
#    corresponding directory under bundles/<name>/ in this repository (23 bundles).
#    Symlinks point to the real files; overlay bundles (github-*, gitlab-*)
#    contain the actual injection files directly.
#
# 2. profiles: higher-level named presets that expand to a set of bundles.
#    Profiles represent stable user intents (local-only, GitHub-hosted, etc.)
#    and do not own files directly.
#
# Usage in downstream projects (.rhiza/template.yml):
#
#   # Profile-based (recommended — picks a sensible bundle set for your context):
#   profiles:
#     - local
#
#   # Bundle-based (advanced — full manual control):
#   templates:
#     - core
#     - tests
#     - github
#
#   # Mixed (profile plus extra bundles):
#   profiles:
#     - github-project
#   templates:
#     - marimo

# Bundle Definitions
bundles:
  # ============================================================================
  # CORE - Required infrastructure
  # ============================================================================
  core:
    description: "Core Rhiza infrastructure"
    required: true
    standalone: true

  github:
    description: "GitHub repository configuration (actions, dependabot, templates, core workflows)"
    standalone: true
    requires: [core]

  # ============================================================================
  # RENOVATE - Automated dependency updates
  # ============================================================================
  renovate:
    description: "Renovate bot configuration for automated dependency updates"
    standalone: true
    requires: []

  # ============================================================================
  # LEGAL - Legal and community files
  # ============================================================================
  legal:
    description: "Legal and community documentation files"
    standalone: true
    requires: []

  # ============================================================================
  # DEVCONTAINER - VS Code DevContainer configuration
  # ============================================================================
  devcontainer:
    description: "VS Code DevContainer configuration for consistent development environments"
    standalone: true
    requires: []
    recommends:
      - github-devcontainer  # Add the GitHub Actions workflow for devcontainer image build validation

  # ============================================================================
  # GITHUB-DEVCONTAINER - GitHub Actions workflow for devcontainer CI
  # ============================================================================
  github-devcontainer:
    description: "GitHub Actions workflow stub for devcontainer image build validation"
    standalone: true
    requires: [devcontainer, github]

  # ============================================================================
  # DOCKER - Docker containerization support
  # ============================================================================
  docker:
    description: "Docker containerization support for building and running containers"
    standalone: true
    requires: []

  # ============================================================================
  # GITHUB-DOCKER - GitHub Actions workflow for Docker lint and build validation
  # ============================================================================
  github-docker:
    description: "GitHub Actions workflow stub for Docker lint, build, and security scan"
    standalone: true
    requires: [docker, github]

  # ============================================================================
  # LFS - Git Large File Storage support
  # ============================================================================
  lfs:
    description: "Git LFS (Large File Storage) installation and management"
    standalone: true
    requires: []

  # ============================================================================
  # PRESENTATION - Presentation building with Marp
  # ============================================================================
  presentation:
    description: "Presentation slides built from PRESENTATION.md using Marp"
    standalone: true
    requires: []
    recommends:
      - marimo  # Presentations often use Marimo for interactive slides

  # ============================================================================
  # PAPER - LaTeX paper compilation targets
  # ============================================================================
  paper:
    description: "LaTeX paper compilation targets (make paper, make paper-clean)"
    standalone: true
    requires: []

  # ============================================================================
  # GITHUB-PAPER - GitHub Actions workflow for LaTeX paper compilation
  # ============================================================================
  github-paper:
    description: "GitHub Actions workflow stub for LaTeX paper compilation and PDF publishing"
    standalone: true
    requires: [paper, github]

  # ============================================================================
  # GITLAB - GitLab CI/CD pipeline configuration
  # ============================================================================
  gitlab:
    description: "GitLab CI/CD pipeline configuration and core workflows (sync, release, weekly)"
    standalone: true
    requires: [core]
    notes: |
      GitLab workflows provide similar functionality to GitHub Actions.
      Add gitlab-tests, gitlab-marimo, or gitlab-book for feature-specific pipelines.

  # ============================================================================
  # GITLAB-TESTS - GitLab CI pipeline for testing
  # ============================================================================
  gitlab-tests:
    description: "GitLab CI pipeline for running tests (rhiza_ci)"
    standalone: true
    requires: [tests, gitlab]

  # ============================================================================
  # GITLAB-MARIMO - GitLab CI pipeline for Marimo notebooks
  # ============================================================================
  gitlab-marimo:
    description: "GitLab CI pipeline for Marimo notebook execution"
    standalone: true
    requires: [marimo, gitlab]

  # ============================================================================
  # GITLAB-BOOK - GitLab CI pipeline for book/docs publishing
  # ============================================================================
  gitlab-book:
    description: "GitLab CI pipeline for book/docs publishing to GitLab Pages"
    standalone: true
    requires: [book, gitlab]

  # ============================================================================
  # TESTS - Testing infrastructure with pytest, coverage, and type checking
  # ============================================================================
  tests:
    description: "Local testing infrastructure with pytest, coverage, and type checking"
    standalone: true
    requires:
      - book
      - core

  # ============================================================================
  # GITHUB-TESTS - GitHub Actions workflows for CI
  # ============================================================================
  github-tests:
    description: "GitHub Actions workflow stubs for CI (rhiza_ci, rhiza_codeql, rhiza_mutation)"
    standalone: true
    requires: [tests, github]

  # ============================================================================
  # BENCHMARKS - Performance benchmarking with pytest-benchmark
  # ============================================================================
  benchmarks:
    description: "Performance benchmarking infrastructure with pytest-benchmark and reporting"
    standalone: false
    requires:
      - tests  # Required: benchmarks depend on the test infrastructure

  # ============================================================================
  # MARIMO - Interactive Marimo notebooks
  # ============================================================================
  marimo:
    description: "Interactive Marimo notebooks for data exploration and documentation"
    standalone: false
    requires:
      - book
      - core

  # ============================================================================
  # GITHUB-MARIMO - GitHub Actions workflow for Marimo notebooks
  # ============================================================================
  github-marimo:
    description: "GitHub Actions workflow stub for Marimo notebook publishing"
    standalone: true
    requires: [marimo, github]

  # ============================================================================
  # BOOK - Documentation book generation
  # ============================================================================
  book:
    description: |
      Comprehensive documentation book generation combining:
      - Documentation site (MkDocs + zensical)
      - Interactive notebooks (if marimo is enabled)
      - Test coverage reports and results (if tests bundle is also enabled)
    standalone: true
    requires:
      - core
    recommends:
      - tests   # Optional: book includes coverage and test reports when tests are enabled
      - marimo  # Optional: book works better with notebook exports

  # ============================================================================
  # GITHUB-BOOK - GitHub Actions workflow for book/docs publishing
  # ============================================================================
  github-book:
    description: "GitHub Actions workflow stub for book/docs publishing to GitHub Pages"
    standalone: true
    requires: [book, github]

  # ============================================================================
  # GH-AW - GitHub Agentic Workflows
  # ============================================================================
  gh-aw:
    description: "GitHub Agentic Workflows for AI-driven repository automation"
    standalone: false
    requires: [github]
    recommends: [tests]
    notes: |
      Provides infrastructure for gh-aw (GitHub Agentic Workflows):
      - Makefile targets for compile/run/status
      - Starter workflow templates
      - CI validation for lock file freshness
      - Documentation
      Note: gh-aw is inherently GitHub-specific and has no local-only split.

# ==============================================================================
# PROFILE DEFINITIONS
#
# Profiles are higher-level named presets that expand to a set of bundles.
# They represent stable user intents (local-only, GitHub-hosted, etc.) and do
# not own files directly.
#
# Rules:
#   - profiles reference bundles only, not raw file paths
#   - selecting a profile is equivalent to selecting all its constituent bundles
#   - users may combine profiles with additional manual bundle selection
#
# Usage in .rhiza/template.yml:
#
#   profiles:
#     - local
#
#   # or combined with extra bundles:
#   profiles:
#     - github-project
#   templates:
#     - marimo
#     - github-marimo
# ==============================================================================
profiles:

  # ============================================================================
  # LOCAL - Local-first development with no hosted workflows
  # ============================================================================
  local:
    description: |
      Local-first development setup with no hosted CI/CD workflow files.
      Suitable for:
        - experiments and research codebases
        - early-stage projects not yet ready for hosted automation
        - projects hosted privately or on platforms other than GitHub/GitLab
      Includes core infrastructure, testing tooling, and documentation.
      No .github/workflows/* files are synced.
    bundles:
      - core
      - book
      - marimo
      - tests

  # ============================================================================
  # GITHUB-PROJECT - Standard GitHub-hosted project
  # ============================================================================
  github-project:
    description: |
      Standard GitHub-hosted project.
      Suitable for open-source or team projects hosted on GitHub.
      Includes core infrastructure, GitHub repository configuration,
      testing tooling, documentation, notebooks, and hosted CI workflows.
    bundles:
      - core
      - github
      - book
      - marimo
      - tests
      - github-book
      - github-marimo
      - github-tests

  # ============================================================================
  # GITLAB-PROJECT - Standard GitLab-hosted project
  # ============================================================================
  gitlab-project:
    description: |
      Standard GitLab-hosted project with GitLab CI/CD pipelines.
      Suitable for projects hosted on GitLab.com or a self-hosted GitLab instance.
      Includes core infrastructure, testing tooling, documentation,
      and GitLab CI pipelines. No .github/ files are synced.
    bundles:
      - core
      - gitlab
      - book
      - marimo
      - tests
      - gitlab-book
      - gitlab-marimo
      - gitlab-tests
