# Rhiza Template Bundle Definitions
#
# This file defines two layers of configuration:
#
# 1. bundles: atomic, file-owning building blocks.
#    Every synced file belongs to a bundle. Feature bundles are local-first —
#    they do not include hosted workflow files. GitHub Actions workflows for a
#    feature live in a dedicated github-<feature> overlay bundle.
#
# 2. profiles: higher-level named presets that expand to a set of bundles.
#    Profiles represent stable user intents (local-only, GitHub-hosted, etc.)
#    and do not own files directly.
#
# Usage in downstream projects (.rhiza/template.yml):
#
#   # Profile-based (recommended — picks a sensible bundle set for your context):
#   profiles:
#     - local
#
#   # Bundle-based (advanced — full manual control):
#   templates:
#     - core
#     - tests
#     - github
#     - github-tests
#
#   # Mixed (profile plus extra bundles):
#   profiles:
#     - github-project
#   templates:
#     - marimo
#     - github-marimo

# Bundle Definitions
bundles:
  # ============================================================================
  # CORE - Required infrastructure
  # ============================================================================
  core:
    description: "Core Rhiza infrastructure"
    required: true
    standalone: true
    files:
      # Core Rhiza files
      - .rhiza/rhiza.mk
      - .rhiza/.cfg.toml
      - .rhiza/.env
      - .rhiza/.gitignore
      - .rhiza/.rhiza-version
      - .rhiza/make.d/custom-env.mk
      - .rhiza/make.d/book.mk
      - .rhiza/make.d/custom-task.mk
      - .rhiza/make.d/quality.mk
      - .rhiza/make.d/bootstrap.mk
      - .rhiza/make.d/releasing.mk
      - .rhiza/assets
      - .rhiza/requirements/README.md
      - .rhiza/requirements/docs.txt
      - .rhiza/requirements/tools.txt
      - .rhiza/utils

      # Root configuration files
      - .bandit
      - Makefile
      - .pre-commit-config.yaml
      - .editorconfig
      - .gitignore
      - .python-version
      - ruff.toml

      # Documentation files.
      - docs/index.md                  # Pointer to README
      - docs/mkdocs-base.yml           # Inherit from this file in your local mkdocs.yml
      - docs/assets                    # The rhiza logo

  github:
    description: "GitHub Actions workflows for CI/CD"
    standalone: true
    requires: [core]
    files:
      # Core GitHub Actions workflows
      # We don't copy the entire .github folder as there are
      # workflows like .github/rhiza_docker etc.

      - .github/workflows/rhiza_sync.yml
      - .github/workflows/rhiza_release.yml
      - .github/actions
      - .github/dependabot.yml

      - .github/secret_scanning.yml
      - .github/ISSUE_TEMPLATE
      - .github/DISCUSSION_TEMPLATE

  # ============================================================================
  # RENOVATE - Automated dependency updates
  # ============================================================================
  renovate:
    description: "Renovate bot configuration for automated dependency updates"
    standalone: true
    requires: []
    files:
      # Renovate configuration
      - renovate.json

  # ============================================================================
  # LEGAL - Legal and community files
  # ============================================================================
  legal:
    description: "Legal and community documentation files"
    standalone: true
    requires: []
    files:
      # Legal files
      - LICENSE

      # Community files
      - .rhiza/CONTRIBUTING.md
      - .rhiza/CODE_OF_CONDUCT.md

      # Security policy (root-level for GitHub visibility)
      # Overwrite this file
      - SECURITY.md

  # ============================================================================
  # DEVCONTAINER - VS Code DevContainer configuration
  # ============================================================================
  devcontainer:
    description: "VS Code DevContainer configuration for consistent development environments"
    standalone: true
    requires: []
    recommends:
      - github-devcontainer  # Add for GitHub-hosted DevContainer publishing
    files:
      # DevContainer configuration
      - .devcontainer

      # Documentation
      - docs/development/DEVCONTAINER.md

  # ============================================================================
  # GITHUB-DEVCONTAINER - GitHub Actions workflow for DevContainer publishing
  # ============================================================================
  github-devcontainer:
    description: "GitHub Actions workflow for DevContainer image publishing"
    standalone: false
    requires:
      - github
      - devcontainer
    files:
      - .github/workflows/rhiza_devcontainer.yml

  # ============================================================================
  # DOCKER - Docker containerization support
  # ============================================================================
  docker:
    description: "Docker containerization support for building and running containers"
    standalone: true
    requires: []
    recommends:
      - github-docker  # Add for GitHub-hosted Docker build and publish workflows
    files:
      # Docker configuration and files
      - docker

      # Make targets
      - .rhiza/make.d/docker.mk

      # Documentation
      - docs/development/DOCKER.md

  # ============================================================================
  # GITHUB-DOCKER - GitHub Actions workflow for Docker builds
  # ============================================================================
  github-docker:
    description: "GitHub Actions workflow for Docker image building and publishing"
    standalone: false
    requires:
      - github
      - docker
    files:
      - .github/workflows/rhiza_docker.yml

  # ============================================================================
  # LFS - Git Large File Storage support
  # ============================================================================
  lfs:
    description: "Git LFS (Large File Storage) installation and management"
    standalone: true
    requires: []
    files:
      # Make targets for LFS
      - .rhiza/make.d/lfs.mk

      # Documentation
      - .rhiza/docs/LFS.md

  # ============================================================================
  # PRESENTATION - Presentation building with reveal.js
  # ============================================================================
  presentation:
    description: "Presentation building using reveal.js and Marimo"
    standalone: true
    requires: []
    recommends:
      - marimo  # Presentations often use Marimo for interactive slides
    files:
      - .rhiza/make.d/presentation.mk
      - docs/development/PRESENTATION.md

  # ============================================================================
  # GITLAB - GitLab CI/CD pipeline configuration
  # ============================================================================
  gitlab:
    description: "GitLab CI/CD pipeline configuration and workflows"
    standalone: true
    requires: [core]
    notes: |
      GitLab workflows provide similar functionality to GitHub Actions.
      Some workflows (like book, ci) may benefit from having their
      corresponding feature templates (book, tests) also enabled.
    files:
      # Main GitLab CI configuration
      - .gitlab-ci.yml

      # GitLab workflow files
      - .gitlab

  # ============================================================================
  # TESTS - Testing infrastructure with pytest, coverage, and type checking
  # ============================================================================
  tests:
    description: "Local testing infrastructure with pytest, coverage, and type checking"
    standalone: true
    requires:
      - book
    recommends:
      - github-tests  # Add for GitHub-hosted CI workflows
    files:
      # Make targets and configuration
      - .rhiza/make.d/test.mk

      - .rhiza/requirements/tests.txt
      - pytest.ini

      # Core/generic test files
      - .rhiza/tests
      - docs/development/TESTS.md

      # Semgrep config (local static analysis, not a workflow)
      - .rhiza/semgrep.yml

  # ============================================================================
  # GITHUB-TESTS - GitHub Actions workflows for test automation
  # ============================================================================
  github-tests:
    description: "GitHub Actions workflows for test automation (CI, CodeQL, weekly runs)"
    standalone: false
    requires:
      - github
      - tests
    files:
      - .github/workflows/rhiza_ci.yml
      - .github/workflows/rhiza_codeql.yml
      - .github/workflows/rhiza_weekly.yml

  # ============================================================================
  # BENCHMARKS - Performance benchmarking with pytest-benchmark
  # ============================================================================
  benchmarks:
    description: "Performance benchmarking infrastructure with pytest-benchmark and reporting"
    standalone: false
    requires:
      - tests  # Required: benchmarks depend on the test infrastructure
    files:
      # Benchmark test infrastructure
      - tests/benchmarks

  # ============================================================================
  # MARIMO - Interactive Marimo notebooks
  # ============================================================================
  marimo:
    description: "Interactive Marimo notebooks for data exploration and documentation"
    standalone: true
    requires:
      - book
    recommends:
      - github-marimo  # Add for GitHub-hosted notebook automation
    files:
      # Marimo configuration
      - .rhiza/make.d/marimo.mk
      - .rhiza/requirements/marimo.txt

      # Documentation
      - docs/development/MARIMO.md

  # ============================================================================
  # GITHUB-MARIMO - GitHub Actions workflow for Marimo notebooks
  # ============================================================================
  github-marimo:
    description: "GitHub Actions workflow for Marimo notebook automation"
    standalone: false
    requires:
      - github
      - marimo
    files:
      - .github/workflows/rhiza_marimo.yml

  # ============================================================================
  # BOOK - Documentation book generation
  # ============================================================================
  book:
    description: |
      Comprehensive documentation book generation combining:
      - API documentation (pdoc)
      - Interactive notebooks (if marimo is enabled)
      - Test coverage reports and results (if tests bundle is also enabled)
    standalone: true
    requires: []
    recommends:
      - tests   # Optional: book includes coverage and test reports when tests are enabled
      - marimo  # Optional: book works better with notebook exports
      - github-book  # Add for GitHub-hosted docs publishing
    files:
      # Book building configuration
      - .rhiza/make.d/book.mk

  # ============================================================================
  # GITHUB-BOOK - GitHub Actions workflow for documentation publishing
  # ============================================================================
  github-book:
    description: "GitHub Actions workflow for documentation building and publishing"
    standalone: false
    requires:
      - github
      - book
    files:
      - .github/workflows/rhiza_book.yml

  # ============================================================================
  # GH-AW - GitHub Agentic Workflows
  # ============================================================================
  gh-aw:
    description: "GitHub Agentic Workflows for AI-driven repository automation"
    standalone: false
    requires: [github]
    recommends: [tests]
    notes: |
      Provides infrastructure for gh-aw (GitHub Agentic Workflows):
      - Makefile targets for compile/run/status
      - Starter workflow templates
      - CI validation for lock file freshness
      - Documentation
      Note: gh-aw is inherently GitHub-specific and has no local-only split.
    files:
      # Makefile extensions
      - .rhiza/make.d/github.mk
      - .rhiza/make.d/agentic.mk
      - .rhiza/make.d/gh-aw.mk

      - .github/agents
      - .github/hooks
      - .github/copilot-instructions.md
      - .github/workflows/copilot-setup-steps.yml

      # Starter agentic workflows
      - .github/workflows/daily-repo-status.md
      - .github/workflows/ci-doctor.md
      - .github/workflows/issue-triage.md

      # CI validation workflow
      - .github/workflows/rhiza_gh-aw-validate.yml

      # Documentation
      - docs/development/GH_AW.md

# ==============================================================================
# PROFILE DEFINITIONS
#
# Profiles are higher-level named presets that expand to a set of bundles.
# They represent stable user intents (local-only, GitHub-hosted, etc.) and do
# not own files directly.
#
# Rules:
#   - profiles reference bundles only, not raw file paths
#   - selecting a profile is equivalent to selecting all its constituent bundles
#   - users may combine profiles with additional manual bundle selection
#
# Usage in .rhiza/template.yml:
#
#   profiles:
#     - local
#
#   # or combined with extra bundles:
#   profiles:
#     - github-project
#   templates:
#     - marimo
#     - github-marimo
# ==============================================================================
profiles:

  # ============================================================================
  # LOCAL - Local-first development with no hosted workflows
  # ============================================================================
  local:
    description: |
      Local-first development setup with no hosted CI/CD workflow files.
      Suitable for:
        - experiments and research codebases
        - early-stage projects not yet ready for hosted automation
        - projects hosted privately or on platforms other than GitHub/GitLab
      Includes core infrastructure, testing tooling, and documentation.
      No .github/workflows/* files are synced.
    bundles:
      - core
      - book
      - tests

  # ============================================================================
  # GITHUB-PROJECT - Standard GitHub-hosted project
  # ============================================================================
  github-project:
    description: |
      Standard GitHub-hosted project with CI/CD and release automation.
      Suitable for open-source or team projects hosted on GitHub.
      Includes core infrastructure, testing tooling, documentation,
      and GitHub Actions workflows for CI, CodeQL, release, and sync.
    bundles:
      - core
      - github
      - book
      - github-book
      - tests
      - github-tests

  # ============================================================================
  # GITLAB-PROJECT - Standard GitLab-hosted project
  # ============================================================================
  gitlab-project:
    description: |
      Standard GitLab-hosted project with GitLab CI/CD pipelines.
      Suitable for projects hosted on GitLab.com or a self-hosted GitLab instance.
      Includes core infrastructure, testing tooling, documentation,
      and GitLab CI pipelines. No .github/ files are synced.
    bundles:
      - core
      - gitlab
      - book
      - tests
