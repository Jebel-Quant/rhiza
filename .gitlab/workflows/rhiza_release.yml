# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Release Workflow for Python Packages (GitLab CI)
#
# This workflow implements a secure, maintainable release pipeline with distinct phases:
#
# 📋 Pipeline Phases:
#   1. 🔍 Validate Tag - Check tag format and ensure release doesn't already exist
#   2. 🏗️ Build - Build Python package with Hatch (if [build-system] is defined in pyproject.toml
#   3. 📝 Draft Release - Create draft GitLab release with build artifacts
#   4. 🚀 Publish to PyPI - Publish package using token or custom feed
#   5. 🏭 Publish to AWS CodeArtifact - Publish package to CodeArtifact (conditional)
#   6. ✅ Finalize Release - Publish the GitLab release with links
#
# 🚀 PyPI Publishing:
#   - Skipped if no dist/ artifacts exist
#   - Skipped if pyproject.toml contains "Private :: Do Not Upload"
#   - Uses PYPI_TOKEN for authentication
#   - For custom feeds, use PYPI_REPOSITORY_URL and PYPI_TOKEN variables
#
# 🏭 AWS CodeArtifact Publishing:
#   - Skipped if AWS_CODEARTIFACT_DOMAIN variable is not set
#   - Skipped if no dist/ artifacts exist
#   - Uses AWS credentials from CI/CD variables (or OIDC via AWS_ROLE_ARN)
#   - Dynamically obtains a CodeArtifact authorization token
#   - Publishes with twine using the CodeArtifact repository endpoint
#
# 📄 Requirements:
#   - pyproject.toml with top-level version field (for Python packages)
#   - PYPI_TOKEN variable for PyPI publishing
#   - AWS_CODEARTIFACT_DOMAIN, AWS_CODEARTIFACT_REPOSITORY, and AWS credentials
#     (for CodeArtifact publishing)
#
# ✅ To Trigger:
#   Create and push a version tag:
#     git tag v1.2.3
#     git push origin v1.2.3

workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/

variables:
  RELEASE_TAG: $CI_COMMIT_TAG

.release_validate_tag:
  stage: .pre
  image: alpine:latest
  script:
    - apk add --no-cache git curl jq
    - |
      TAG="$CI_COMMIT_TAG"
      echo "Validating tag: $TAG"

      # Check if release already exists (using GitLab API)
      RELEASE_EXISTS=$(curl --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${TAG}" \
        -s -o /dev/null -w "%{http_code}")

      if [ "$RELEASE_EXISTS" = "200" ]; then
        echo "❌ Release '$TAG' already exists. Please use a new tag."
        exit 1
      fi

      echo "✅ Tag validation passed"
  artifacts:
    reports:
      dotenv: release.env

release:build:
  stage: build
  needs:
    - job: .release_validate_tag
      optional: true
  image: ghcr.io/astral-sh/uv:0.9.30-bookworm
  before_script:
    - git fetch --tags
  script:
    - |
      export UV_EXTRA_INDEX_URL="${UV_EXTRA_INDEX_URL}"
      uv python install $(cat .python-version)
      uv sync --all-extras --all-groups --frozen

      # Verify version matches tag
      if [ -f "pyproject.toml" ]; then
        TAG_VERSION="${CI_COMMIT_TAG#v}"
        PROJECT_VERSION=$(uv version --short)

        if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
          echo "❌ Version mismatch: pyproject.toml has '$PROJECT_VERSION' but tag is '$TAG_VERSION'"
          exit 1
        fi
        echo "✅ Version verified: $PROJECT_VERSION matches tag"
      fi

      # Detect buildable Python package
      if [ -f "pyproject.toml" ] && grep -q '^\[build-system\]' pyproject.toml; then
        echo "📦 Building package..."
        uv build
      else
        echo "⏭️ No buildable package detected, skipping build"
        mkdir -p dist  # Create empty dist directory
      fi
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

release:draft:
  stage: deploy
  needs:
    - job: release:build
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      TAG="$CI_COMMIT_TAG"

      # Create draft release using GitLab API
      RELEASE_NOTES="Release $TAG"

      curl --request POST \
        --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        --data "tag_name=$TAG" \
        --data "name=$TAG" \
        --data "description=$RELEASE_NOTES" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"

      echo "✅ Draft release created"

release:pypi:
  stage: deploy
  needs:
    - job: release:build
      artifacts: true
    - job: release:draft
  image: ghcr.io/astral-sh/uv:0.9.30-bookworm
  before_script:
    - uv python install $(cat .python-version)
    - uv pip install twine
  script:
    - |
      # Check if dist contains artifacts and not marked as private
      if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
        echo "⚠️ No dist/ artifacts found. Skipping PyPI publish."
        exit 0
      fi

      if grep -R "Private :: Do Not Upload" pyproject.toml; then
        echo "⏭️ Package marked as private. Skipping PyPI publish."
        exit 0
      fi

      # Publish to PyPI
      if [ -n "$PYPI_REPOSITORY_URL" ]; then
        echo "📦 Publishing to custom repository: $PYPI_REPOSITORY_URL"
        twine upload --repository-url "$PYPI_REPOSITORY_URL" \
          --username __token__ --password "$PYPI_TOKEN" \
          --skip-existing dist/*
      else
        echo "📦 Publishing to PyPI"
        twine upload --username __token__ --password "$PYPI_TOKEN" \
          --skip-existing dist/*
      fi

      echo "✅ Published to PyPI"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
      when: on_success
  allow_failure: false

release:codeartifact:
  stage: deploy
  needs:
    - job: release:build
      artifacts: true
    - job: release:draft
  image: ghcr.io/astral-sh/uv:0.9.30-bookworm
  before_script:
    - apt-get update -qq && apt-get install -y -qq awscli > /dev/null 2>&1
    - uv python install $(cat .python-version)
    - uv pip install twine
  script:
    - |
      # Check if CodeArtifact is configured
      if [ -z "$AWS_CODEARTIFACT_DOMAIN" ]; then
        echo "⏭️ Skipping: AWS_CODEARTIFACT_DOMAIN not configured"
        exit 0
      fi

      # Check if dist contains artifacts
      if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
        echo "⚠️ No dist/ artifacts found. Skipping CodeArtifact publish."
        exit 0
      fi

      REGION="${AWS_REGION:-us-east-1}"

      OWNER_ARGS=""
      if [ -n "$AWS_CODEARTIFACT_OWNER" ]; then
        OWNER_ARGS="--domain-owner $AWS_CODEARTIFACT_OWNER"
      fi

      # Get CodeArtifact authorization token
      TOKEN=$(aws codeartifact get-authorization-token \
        --domain "$AWS_CODEARTIFACT_DOMAIN" \
        --region "$REGION" \
        $OWNER_ARGS \
        --query authorizationToken --output text)

      # Get CodeArtifact repository endpoint
      REPO_URL=$(aws codeartifact get-repository-endpoint \
        --domain "$AWS_CODEARTIFACT_DOMAIN" \
        --repository "$AWS_CODEARTIFACT_REPOSITORY" \
        --format pypi \
        --region "$REGION" \
        $OWNER_ARGS \
        --query repositoryEndpoint --output text)

      echo "📦 Publishing to CodeArtifact: $AWS_CODEARTIFACT_DOMAIN/$AWS_CODEARTIFACT_REPOSITORY"
      twine upload \
        --repository-url "$REPO_URL" \
        --username aws \
        --password "$TOKEN" \
        --skip-existing \
        dist/*

      echo "✅ Published to CodeArtifact"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
      when: on_success
  allow_failure: false

release:finalize:
  stage: .post
  needs:
    - job: release:build
    - job: release:pypi
      optional: true
    - job: release:codeartifact
      optional: true
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq python3
  script:
    - |
      TAG="$CI_COMMIT_TAG"
      RELEASE_BODY=""

      # Add PyPI link if published
      if [ -f "pyproject.toml" ]; then
        PACKAGE_NAME=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['name'])" 2>/dev/null || echo "")
        if [ -n "$PACKAGE_NAME" ]; then
          VERSION="${TAG#v}"
          if [ -z "$PYPI_REPOSITORY_URL" ]; then
            RELEASE_BODY="${RELEASE_BODY}\n\n### PyPI Package\n\n[$PACKAGE_NAME](https://pypi.org/project/$PACKAGE_NAME/$VERSION/)"
          else
            RELEASE_BODY="${RELEASE_BODY}\n\n### Custom Feed Package\n\n[$PACKAGE_NAME]($PYPI_REPOSITORY_URL)"
          fi

          # Add CodeArtifact link if published
          if [ -n "$AWS_CODEARTIFACT_DOMAIN" ] && [ -n "$AWS_CODEARTIFACT_REPOSITORY" ]; then
            REGION="${AWS_REGION:-us-east-1}"
            CONSOLE_URL="https://${REGION}.console.aws.amazon.com/codesuite/codeartifact/d/${AWS_CODEARTIFACT_DOMAIN}/r/${AWS_CODEARTIFACT_REPOSITORY}/p/pypi/p/${PACKAGE_NAME}/versions?region=${REGION}"
            RELEASE_BODY="${RELEASE_BODY}\n\n### AWS CodeArtifact Package\n\n[$PACKAGE_NAME@$VERSION]($CONSOLE_URL) (\`${AWS_CODEARTIFACT_DOMAIN}/${AWS_CODEARTIFACT_REPOSITORY}\`)"
          fi
        fi
      fi

      # Update release with additional information
      curl --request PUT \
        --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        --data "description=Release $TAG$RELEASE_BODY" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${TAG}"

      echo "✅ Release finalized"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
      when: on_success
