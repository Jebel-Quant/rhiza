# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Link Check (GitLab CI)
#
# Purpose: This workflow checks that all hyperlinks in README.md are valid
#          and not returning errors. It uses the lychee link checker.
#
# Trigger: This workflow runs on merge requests or pushes when README.md changes.
#          For scheduled weekly runs, configure a pipeline schedule in GitLab UI.

link:check:
  stage: test
  needs: []
  image: lycheeverse/lychee:latest
  script:
    - lychee --verbose --no-progress --accept 200,206,429 README.md
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - README.md
    - if: $CI_COMMIT_BRANCH
      changes:
        - README.md
    - if: $CI_PIPELINE_SOURCE == "schedule"
