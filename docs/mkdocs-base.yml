site_name: Rhiza
docs_dir: .
site_dir: _mkdocs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  logo: assets/rhiza-logo.svg
  favicon: assets/rhiza-logo.svg

plugins:
  - search

markdown_extensions:
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - toc:
      permalink: true
      toc_depth: 3

extra_javascript:
  - https://unpkg.com/mermaid@11.4.0/dist/mermaid.esm.min.mjs

# nav is overwritten completely in mkdocs.yml
nav:
  - Home: index.md
  - Notebooks: notebooks.md
  - Reports: reports.md
  - Paper: paper/rhiza.pdf
