# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Paper
#
# Purpose: Compile the LaTeX paper (paper/*.tex) to a PDF and publish it
#          as a downloadable workflow artifact. Pushes the PDF to a paper branch.
#
# Trigger: On push/PR to main/master when paper/** changes, or manual dispatch.

name: "(RHIZA) PAPER"

# Cancel superseded in-progress runs of this workflow for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
    paths:
      - 'paper/**'
      - '.github/workflows/rhiza_paper.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'paper/**'
      - '.github/workflows/rhiza_paper.yml'
  workflow_dispatch:

jobs:
  paper:
    uses: jebel-quant/rhiza/.github/workflows/rhiza_paper.yml@v0.18.9
    secrets: inherit
    permissions:
      contents: write
