# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Continuous Integration (GitLab CI)
#
# Purpose: Run tests on multiple Python versions, check dependencies, run
#          pre-commit hooks, verify documentation coverage, validate the
#          project, run security scans, and check license compliance.
#
# Trigger: On push and merge requests.

ci:test:
  # CI budget: ≤20 min (test matrix execution). Last measured: 2026-05-28.
  timeout: 20m
  stage: test
  image: $UV_IMAGE
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13", "3.14"]
  variables:
    GIT_LFS_SKIP_SMUDGE: "0"
  before_script:
    - apt-get update && apt-get install -y git-lfs chromium
    - git lfs pull
  coverage: '/TOTAL.*\s+(\d+%)$/'
  script:
    - echo "Testing with Python $PYTHON_VERSION"
    - export UV_EXTRA_INDEX_URL="${UV_EXTRA_INDEX_URL}"
    # `make test` bootstraps its own environment via the `install` target, which
    # creates the venv with PYTHON_VERSION (a `?=` default the matrix env var
    # overrides) and provisions test tooling on the fly — no explicit `uv venv`.
    - make test

  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

ci:docs-coverage:
  # CI budget: ≤10 min (docs quality check). Last measured: 2026-05-28.
  timeout: 10m
  stage: test
  image: $UV_IMAGE
  script:
    - export UV_EXTRA_INDEX_URL="${UV_EXTRA_INDEX_URL}"
    - make docs-coverage

  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

