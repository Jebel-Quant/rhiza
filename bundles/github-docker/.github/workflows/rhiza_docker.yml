# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Docker
#
# Purpose: Lint docker/Dockerfile with hadolint, build the image for validation,
#          and scan it for security vulnerabilities with Trivy.
#
# Trigger: On push and pull_request to main/master.

name: "(RHIZA) DOCKER"

# Cancel superseded in-progress runs of this workflow for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  docker:
    uses: jebel-quant/rhiza/.github/workflows/rhiza_docker.yml@v0.19.0
    secrets: inherit
    permissions:
      contents: read
      security-events: write
