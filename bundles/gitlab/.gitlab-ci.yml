# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# GitLab CI/CD Main Configuration
#
# This file includes all individual workflow files from .gitlab/workflows/
# and defines the pipeline structure for the rhiza project.
#
# Workflows included:
#   - CI: Run tests on multiple Python versions
#   - QUALITY: Dependency checks, pre-commit hooks, docs coverage, link checking
#   - MARIMO: Discover and execute Marimo notebooks
#   - PAPER: Build paper/report artifacts
#   - BOOK: Build and deploy documentation
#   - SYNC: Synchronize with template repository
#   - RELEASE: Release workflow for tags
#   - RENOVATE: Automated dependency updates (scheduled)
#   - WEEKLY: Semgrep, license, and deptry checks (scheduled)

# Define pipeline stages
stages:
  - .pre          # Pre-pipeline jobs (matrix generation, validation)
  - build         # Build jobs
  - test          # Test jobs (CI, marimo, validate, deptry, pre-commit)
  - deploy        # Deployment jobs (pages, sync)
  - .post         # Post-pipeline jobs (finalization)

# Default settings for all jobs
default:
  # Retry failed jobs once
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

  # Persist uv's wheel cache and managed-Python installs across jobs. GitLab only
  # caches paths under $CI_PROJECT_DIR, so UV_CACHE_DIR / UV_PYTHON_INSTALL_DIR
  # (see variables:) redirect them into the already-git-ignored .cache/ dir. The
  # $PYTHON_VERSION prefix gives the test matrix a per-version cache so its
  # parallel legs don't race on a shared key (unset → shared cache for the rest).
  cache:
    key:
      prefix: "${PYTHON_VERSION}"
      files:
        - uv.lock
    paths:
      - .cache/uv
      - .cache/uv-python

# Include individual workflow files
# These files are organised by purpose and mirror the GitHub Actions structure

# CI/CD Testing Workflows
include:
  # Continuous Integration - Python matrix testing
  - local: '.gitlab/workflows/rhiza_ci.yml'
    rules:
      - if: $CI_COMMIT_TAG
        when: never
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      - if: $CI_COMMIT_BRANCH

  # Quality - Dependency checks, pre-commit hooks, docs coverage, link checking
  - local: '.gitlab/workflows/rhiza_quality.yml'
    rules:
      - if: $CI_COMMIT_TAG
        when: never
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      - if: $CI_COMMIT_BRANCH

  # Quality Review - Advisory Claude design review of the MR diff (opt-in).
  # `exists` keeps this a no-op unless the gitlab-quality-review bundle is
  # synced; the job itself further gates on CLAUDE_QUALITY_REVIEW_ENABLED.
  - local: '.gitlab/workflows/rhiza_quality_review.yml'
    rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        exists:
          - '.gitlab/workflows/rhiza_quality_review.yml'

  # Marimo Notebooks - Run and publish notebook artefacts
  - local: '.gitlab/workflows/rhiza_marimo.yml'
    rules:
      - if: $CI_COMMIT_TAG
        when: never
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      - if: $CI_COMMIT_BRANCH == "main"
      - if: $CI_COMMIT_BRANCH == "master"

  # Paper - Build paper/report artifacts
  - local: '.gitlab/workflows/rhiza_paper.yml'
    rules:
      - if: $CI_COMMIT_TAG
        when: never
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      - if: $CI_COMMIT_BRANCH

# Deployment Workflows
  # Book - Build and deploy documentation to GitLab Pages
  - local: '.gitlab/workflows/rhiza_book.yml'
    rules:
      - if: $CI_COMMIT_TAG
        when: never
      - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      - if: $CI_COMMIT_BRANCH == "main"
      - if: $CI_COMMIT_BRANCH == "master"

  # Renovate - Automated dependency updates (scheduled)
  - local: '.gitlab/workflows/rhiza_renovate.yml'
    rules:
      - if: '$CI_PIPELINE_SOURCE == "schedule"'
        when: always
      - when: never

  # Weekly - Semgrep, license checks, deptry (scheduled)
  - local: '.gitlab/workflows/rhiza_weekly.yml'
    rules:
      - if: '$CI_PIPELINE_SOURCE == "schedule"'
        when: always
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      - when: never


# Release Workflow
  # Release - Create releases and publish packages
  - local: '.gitlab/workflows/rhiza_release.yml'
    rules:
      - if: $CI_COMMIT_TAG =~ /^v.*/

# Variables that can be overridden per project
# These are the same variables used in GitHub Actions workflows
variables:
  # UV package manager configuration
  UV_EXTRA_INDEX_URL: ""

  # Single source of truth for the uv/Python CI image. Every job references
  # `image: $UV_IMAGE`; bump the tag here to move the whole pipeline. Kept in
  # step with the uv version GitHub Actions pins in .github/workflows/.
  UV_IMAGE: "ghcr.io/astral-sh/uv:0.11.16-debian"

  # Redirect uv's caches under the git-ignored .cache/ dir so GitLab (which only
  # caches paths inside $CI_PROJECT_DIR) can persist them — see default: cache:.
  UV_CACHE_DIR: "${CI_PROJECT_DIR}/.cache/uv"
  UV_PYTHON_INSTALL_DIR: "${CI_PROJECT_DIR}/.cache/uv-python"

  # PyPI configuration
  PYPI_REPOSITORY_URL: ""

  # Sync configuration
  CREATE_MR: "true"
