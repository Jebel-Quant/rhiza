# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Validate Agentic Workflows
#
# Purpose: Ensures that agentic workflow lock files (.lock.yml) are up to date
#          with their Markdown sources. Fails if any .lock.yml is stale after
#          running `gh aw compile`. Skips gracefully when the gh-aw extension
#          is not yet available.
#
#          Thin stub: the validation logic lives in the reusable workflow in
#          jebel-quant/rhiza; this file only wires up the triggers.
#
# Trigger: On pull requests and pushes to main when .github/workflows/*.md or
#          *.lock.yml files change.

name: "(RHIZA) VALIDATE AGENTIC WORKFLOWS"

on:
  pull_request:
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/*.lock.yml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/*.lock.yml"

permissions:
  contents: read

jobs:
  validate:
    uses: jebel-quant/rhiza/.github/workflows/rhiza_gh-aw-validate.yml@v0.19.0
    secrets: inherit
    permissions:
      contents: read
